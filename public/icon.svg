  <ellipse cx="256" cy="256" rx="175" ry="125" fill="none" stroke="white" stroke-width="4" opacity="0.15"/>
  <ellipse cx="256" cy="256" rx="118" ry="82" fill="none" stroke="white" stroke-width="4" opacity="0.15"/>

  <!-- Letter R centred -->
